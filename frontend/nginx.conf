# Serves the built SPA inside the frontend container.
# All API/auth routing happens in the edge proxy (nginx/nginx.conf).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The JS bundle and CSS are otherwise shipped uncompressed, which
    # dominates cold-cache load time (365KB -> ~116KB gzipped).
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Hashed build assets can be cached forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: client-side routes resolve to index.html
    location / {
        try_files $uri /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
