# CI: runs the same quality gates as local development (see CLAUDE.md).
#   - backend:  ./gradlew check   (tests + JaCoCo 90% coverage + ArchUnit;
#                Testcontainers ITs use the runner's Docker daemon)
#   - frontend: npm run test:coverage (Vitest, 90% gate) + npm run build
#   - docker:   docker compose build, to catch Dockerfile/compose drift
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — gradlew check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test, verify coverage
        working-directory: backend
        run: ./gradlew check 2>&1 | tee gradle-check.log; exit ${PIPESTATUS[0]}

      # Surface failure details as workflow annotations (visible via the public
      # checks API, useful when logs/artifacts aren't accessible).
      - name: Annotate failures
        if: failure()
        working-directory: backend
        run: |
          find build/test-results -name '*.xml' 2>/dev/null | while read -r f; do
            python3 - "$f" <<'EOF'
          import sys, xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          for tc in root.iter('testcase'):
              for fl in tc.findall('failure') + tc.findall('error'):
                  msg = (fl.get('message') or (fl.text or '').strip().splitlines()[0:1] or [''])
                  msg = msg if isinstance(msg, str) else (msg[0] if msg else '')
                  name = f"{tc.get('classname')}.{tc.get('name')}"
                  print(f"::error title={name}::{msg[:600]}")
          EOF
          done
          grep -A 3 "What went wrong" gradle-check.log | head -20 | while IFS= read -r l; do
            echo "::error title=gradle::${l}"
          done

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/

  frontend:
    name: Frontend — coverage + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage gate
        run: npm run test:coverage

      - name: Production build
        run: npm run build

  docker:
    name: Docker — compose build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build backend frontend
