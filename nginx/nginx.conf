# Edge reverse proxy: single public entry point for the stack.
#   /api, /oauth2, /login  -> backend (Spring Boot, :8080)
#   everything else        -> frontend (static SPA nginx, :80)

upstream backend {
    server backend:8080;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Forwarded headers so Spring builds correct external URLs (OAuth2 redirects)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # SSE event streams: no buffering, long-lived connections
    location ~ ^/api/lists/[^/]+/events$ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location /api/ {
        proxy_pass http://backend;
    }

    # OAuth2 authorization + Google callback
    location /oauth2/ {
        proxy_pass http://backend;
    }

    location /login/ {
        proxy_pass http://backend;
    }

    location / {
        proxy_pass http://frontend;
    }
}
