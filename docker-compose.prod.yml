# Production override for the EC2 host — images come from ECR instead of
# local builds, nginx terminates TLS, certbot renews the Let's Encrypt cert.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# .env (rendered by deploy/aws/deploy-on-instance.sh from SSM Parameter Store)
# provides: DOMAIN, ECR_REGISTRY, IMAGE_TAG, DB_PASSWORD, GOOGLE_*, JWT_SECRET,
# DASH0_ENDPOINT, DASH0_AUTH_TOKEN.

services:
  postgres:
    restart: unless-stopped
    # Ship container stdout/stderr to the collector's fluent_forward receiver;
    # the tag becomes service.name in Dash0 (see observability/otelcol.yaml).
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        # Don't block container output if the collector is down; buffer instead.
        fluentd-async: "true"
        tag: postgres

  backend:
    image: ${ECR_REGISTRY}/shopmate/backend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      FRONTEND_BASE_URL: https://${DOMAIN}
      # 2 GiB host shared with postgres + nginx: cap the JVM at half the
      # container-visible RAM instead of the default quarter.
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=50 -javaagent:/otel/opentelemetry-javaagent.jar
      # OTel Java agent → collector sidecar (traces + metrics + logback logs).
      # Backend keeps the default json-file log driver: its logs already reach
      # Dash0 via the agent, structured and trace-correlated.
      OTEL_SERVICE_NAME: shopmate-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=shopmate,service.version=${IMAGE_TAG:-latest},deployment.environment.name=production
      OTEL_METRIC_EXPORT_INTERVAL: "60000"

  frontend:
    image: ${ECR_REGISTRY}/shopmate/frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped

  nginx:
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: nginx
    # /telemetry/ proxies browser RUM to the collector; nginx resolves the
    # upstream at startup, so the collector container must exist first.
    depends_on:
      otel-collector:
        condition: service_started
    ports: !override
      - "80:80"
      - "443:443"
    volumes: !override
      - ./nginx/nginx.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    # The image's entrypoint only runs its envsubst template step when the
    # command starts with "nginx" — with a custom command we must render the
    # template ourselves. The reload loop picks up certs renewed by certbot.
    command: >-
      /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && (while :; do sleep 6h; nginx -s reload; done &)
      && exec nginx -g 'daemon off;'"

  # Renews via webroot through nginx's :80 ACME location. The first issuance
  # is done standalone by deploy-on-instance.sh before nginx can start.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: certbot

  # Telemetry gateway: receives OTLP from the backend agent and (via nginx)
  # the browser SDK, docker logs via fluent_forward, and scrapes host +
  # container metrics. Exports everything to Dash0.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    restart: unless-stopped
    # root: docker_stats needs /var/run/docker.sock, hostmetrics reads /hostfs
    user: "0:0"
    environment:
      DASH0_ENDPOINT: ${DASH0_ENDPOINT}
      DASH0_AUTH_TOKEN: ${DASH0_AUTH_TOKEN}
    volumes:
      - ./observability/otelcol.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/hostfs:ro
    ports:
      # The fluentd log driver connects from the docker daemon on the host,
      # not from inside the compose network — publish on loopback only.
      - "127.0.0.1:24224:24224"
    # Keep the sidecar's share of the 2 GiB host bounded (memory_limiter in
    # the collector config kicks in at 200 MiB, this is the hard stop).
    mem_limit: 300m

volumes:
  letsencrypt:
  certbot-webroot:
